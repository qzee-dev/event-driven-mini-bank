<!DOCTYPE html>
<html>
<body>
<h1>User App</h1>

<button onclick="loadUsers()">Users</button>
<pre id="users"></pre>

<input id="from" placeholder="from">
<input id="to" placeholder="to">
<input id="amount" placeholder="amount">
<button onclick="transfer()">Send</button>

<script>
async function loadUsers(){
  const res=await fetch("http://localhost:3000/users");
  users.innerText=JSON.stringify(await res.json(),null,2);
}

async function transfer(){
  await fetch("http://localhost:3000/transfer",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      from:Number(from.value),
      to:Number(to.value),
      amount:Number(amount.value)
    })
  });
  alert("Processing");
}
</script>
</body>
</html>
